version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - CACHE_TTL=3600
      - DEFAULT_RATE_LIMIT=100
      - DEMO_API_KEY=demo_key_99f2b8
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    restart: always
